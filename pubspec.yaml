name: handoff
description: "A Flutter plugin for Apple's Handoff functionality."
version: 0.3.0
homepage: https://github.com/mastermakrela/flutter-handoff
repository: https://github.com/mastermakrela/flutter-handoff
issue_tracker: https://github.com/mastermakrela/flutter-handoff/issues

topics:
  - ios
  - handoff
  - apple
  - continuity

environment:
  sdk: ^3.5.0
  flutter: ">=3.24.0"

dependencies:
  flutter:
    sdk: flutter
  plugin_platform_interface: ^2.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ">=5.0.0 <7.0.0"

flutter:
  plugin:
    platforms:
      ios:
        pluginClass: HandoffPlugin
